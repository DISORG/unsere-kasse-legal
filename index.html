<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsere Kasse — Rechtliches</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --muted: #666666;
            --accent: #2563eb;
            --border: #e5e7eb;
            --card-bg: #f9fafb;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111827;
                --text: #f3f4f6;
                --muted: #9ca3af;
                --accent: #60a5fa;
                --border: #374151;
                --card-bg: #1f2937;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.7;
            color: var(--text);
            background: var(--bg);
            max-width: 480px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            text-align: center;
        }
        h1 {
            font-size: 1.75rem;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            color: var(--muted);
            margin-bottom: 2.5rem;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .links a {
            display: block;
            padding: 0.9rem 1.25rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            transition: border-color 0.2s;
        }
        .links a:hover {
            border-color: var(--accent);
        }
        .links a span {
            font-size: 1.2rem;
            margin-right: 0.5rem;
        }
        .footer {
            margin-top: 3rem;
            color: var(--muted);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<h1>Unsere Kasse</h1>
<p class="subtitle">Rechtliche Informationen</p>

<div class="links">
    <a href="impressum.html">
        <span>&#x1F3E2;</span> Impressum
    </a>
    <a href="datenschutz.html">
        <span>&#x1F512;</span> Datenschutzerkl&auml;rung
    </a>
    <a href="nutzungsbedingungen.html">
        <span>&#x1F4C4;</span> Nutzungsbedingungen
    </a>
</div>

<p class="footer">
    Unsere Kasse &mdash; iOS-App zur gemeinsamen Haushaltsbuchf&uuml;hrung
</p>

</body>
</html>
